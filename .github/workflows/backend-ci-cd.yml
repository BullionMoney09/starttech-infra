name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  backend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go Mod Tidy
        working-directory: backend
        run: go mod tidy


      - name: Run Tests
        working-directory: backend
        run: go test ./...

      - name: Build Docker Image
        working-directory: backend
        run: docker build -t starttech-backend .

